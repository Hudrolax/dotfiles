[general]
import = [

    "C:\\Users\\hudro\\AppData\\Roaming\\alacritty\\themes\\themes\\monokai_pro.toml"
]

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"
LANG = "en_US.UTF-8"

[font]
size = 9

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[[keyboard.bindings]]
chars = " ts"
key = "4"
mods = "Control"

[[keyboard.bindings]]
chars = " bm"
key = ","
mods = "Control"

[[keyboard.bindings]]
chars = " bM"
key = "."
mods = "Control"

[[keyboard.bindings]]
action = 'Paste'
key = "v"
mods = "Control"

[window]
decorations = "None"
opacity = 0.95
startup_mode = "Maximized"

[window.padding]
x = 0
y = 0


[terminal.shell]
program = "wsl"
args = [
    "-d",
    "Ubuntu",
    "--cd",
    "~"
]


[selection]
save_to_clipboard = true
